spring.application.name=deco
# MyBatis \uc124\uc815: mapper \ud3f4\ub354 \uc548\uc758 \ubaa8\ub4e0 xml \ud30c\uc77c\uc744 \uc77d\uc74c
# 1. MyBatis Mapper XML \uc704\uce58 \uc124\uc815 (\ud558\uc704 \ud3f4\ub354 \ud3ec\ud568)
# 'mapper' \ud3f4\ub354 \uc544\ub798\uc758 \ubaa8\ub4e0 \ud3f4\ub354(**)\uc5d0 \uc788\ub294 \ubaa8\ub4e0 xml \ud30c\uc77c\uc744 \uc77d\uc2b5\ub2c8\ub2e4.
mybatis.mapper-locations=classpath:/mapper/**/*.xml

# 2. \uacb0\uacfc \uac12\uc5d0 CamelCase \uc801\uc6a9 (\uc120\ud0dd \uc0ac\ud56d\uc774\uc9c0\ub9cc \uac15\ub825 \ucd94\ucc9c)
# DB\uc758 USER_NAME(snake_case)\uc744 Java\uc758 userName(camelCase)\uc73c\ub85c \uc790\ub3d9\uc73c\ub85c \ub9e4\ud551\ud574\uc90d\ub2c8\ub2e4.
mybatis.configuration.map-underscore-to-camel-case=true

# 3. VO/DTO \ud328\ud0a4\uc9c0 \uacbd\ub85c \uc124\uc815 (\uc120\ud0dd \uc0ac\ud56d)
# XML\uc5d0\uc11c resultType\uc744 \uc4f8 \ub54c \ud328\ud0a4\uc9c0\uba85 \uc0dd\ub7b5\uc744 \uc704\ud574 \uc0ac\uc6a9\ud569\ub2c8\ub2e4. (\uc608: com.example.vo.UserVO -> UserVO)
mybatis.type-aliases-package=com.deco.yanbang.service.vo
